name: Format and Lint
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-python:
    name: Format and Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@a9b33f02405f50e505f17ab8530e42a23200a5d1
        with:
          enable-cache: true
      - name: Run Ruff
        run: uv run ruff check . --output-format=github
      - name: Ruff format
        run: uv run ruff format . --check

  lint-docs:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Markdown Lint base-files
        uses: DavidAnson/markdownlint-cli2-action@0ec86e944ca4978984a7ee888ee9b9d47b3203ff
        with:
          globs: |
            *.md
            .github/**/*.md
          config: ./.markdownlint.json
